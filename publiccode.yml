publiccodeYmlVersion: "0.4"
name: Sovereign Accessibility Auditor
url: "https://github.com/rwrw01/sovereign-accessibility-auditor"
releaseDate: "2026-03-06"
developmentStatus: concept
softwareType: standalone/web
platforms:
  - web
  - linux

description:
  nl:
    localisedName: Sovereign Accessibility Auditor
    shortDescription: >-
      Open-source WCAG 2.2 AA audit-platform voor Nederlandse gemeenten
    longDescription: >-
      De Sovereign Accessibility Auditor (SAA) is een soeverein,
      open-source toegankelijkheidsaudit-platform ontworpen voor
      Nederlandse gemeenten. Het combineert 7 geautomatiseerde
      testlagen om WCAG 2.2 AA-dekking te verhogen van ~30%
      (huidige tooling) naar ~65%. Het platform volgt de Common
      Ground 5-lagenarchitectuur en is volledig zelf te hosten
      zonder vendor lock-in.
    features:
      - Multi-engine WCAG scanner (Pa11y + axe-core + IBM Equal Access)
      - Visuele regressietests (reflow, zoom, text-spacing)
      - Toetsenbord- en focustests
      - Accessibility tree vergelijking
      - Touch target meting
      - Screenreader simulatie
      - Cognitieve toegankelijkheidsanalyse (Ollama + Gemma 3)
      - NL Design System dashboard
      - DOCX/PDF/JSON/CSV rapportage

