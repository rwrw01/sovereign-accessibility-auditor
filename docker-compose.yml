    restart: unless-stopped
    environment:
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      SCAN_CONCURRENCY: "2"
      OLLAMA_URL: "http://ollama:11434"
      NODE_ENV: production
    networks:
      - redis-net
      - scanner-net
      - cognitive-net
    depends_on:
      valkey:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp/scanner:noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m

  ollama:
    image: ollama/ollama:0.6.2
    restart: unless-stopped
    networks:
      - cognitive-net
    volumes:
      - ollama-data:/root/.ollama
    deploy:
      resources:
        limits:
          memory: 8g
          cpus: "4.0"
        reservations:
          memory: 4g
    environment:
      OLLAMA_NUM_PARALLEL: "1"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:11434/api/tags || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

volumes:
  postgres-data:
  valkey-data:
  ollama-data:

networks:
  db-net:
    driver: bridge
    internal: true
  redis-net:
    driver: bridge
    internal: true
  scanner-net:
    driver: bridge
  cognitive-net:
    driver: bridge
    internal: true
