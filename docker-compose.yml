# Docker Compose — lokale ontwikkeling
# PostgreSQL + Valkey + L1 Scanner

services:
  postgres:
    image: postgres:16.8-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: saa
      POSTGRES_USER: saa
      POSTGRES_PASSWORD: saa_dev_password
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - db-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saa -d saa"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=64m
      - /run/postgresql:noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true

  valkey:
    image: valkey/valkey:8.1-alpine
    restart: unless-stopped
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - valkey-data:/data
    networks:
      - redis-net
    command: ["valkey-server", "--maxmemory", "256mb", "--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    read_only: true
    tmpfs:
      - /tmp:noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true

  scanner-l1:
    build:
      context: .
      dockerfile: packages/scanners/multi-engine/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      SCAN_CONCURRENCY: "2"
      NODE_ENV: production
    networks:
      - redis-net
      - scanner-net
    depends_on:
      valkey:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp/scanner:noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m

  scanner-l2:
    build:
      context: .
      dockerfile: packages/scanners/visual-regression/Dockerfile
    restart: unless-stopped
    environment:
      REDIS_HOST: valkey
      REDIS_PORT: "6379"
      SCAN_CONCURRENCY: "2"
      NODE_ENV: production
    networks:
      - redis-net
      - scanner-net
    depends_on:
      valkey:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp/scanner:noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m

volumes:
  postgres-data:
  valkey-data:

networks:
  db-net:
    driver: bridge
    internal: true
  redis-net:
    driver: bridge
    internal: true
  scanner-net:
    driver: bridge
