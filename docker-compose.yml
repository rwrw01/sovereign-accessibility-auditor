      valkey:
        condition: service_healthy
    read_only: true
    tmpfs:
      - /tmp/scanner:noexec,nosuid,size=256m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2.0"
        reservations:
          memory: 512m

  scanner-l3:
